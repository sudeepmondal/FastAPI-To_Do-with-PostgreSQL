# ============================================================
# docker-compose.yml - FastAPI + PostgreSQL
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:15
    container_name: todo_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: tododb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── FastAPI Application ──────────────────────────────────
  api:
    build: .
    container_name: todo_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:yourpassword@db:5432/tododb
      SECRET_KEY: super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: